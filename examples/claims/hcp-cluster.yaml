apiVersion: legion.io/v1alpha1
kind: LegionCluster
metadata:
  name: my-hcp-cluster
  namespace: cluster-provisioning
spec:
  compositionRef:
    name: hcp-aws
  clusterType: hcp
  clusterName: my-hcp-cluster
  baseDomain: example.com
  cloudRegion: us-east-2
  clusterVersion: "4.17.0"
  instanceType: m5.xlarge
  workerReplicas: 2
  rootVolumeSize: 120
  rootVolumeType: gp3
  networking:
    vpcCidr: "10.0.0.0/16"
    # AZ suffixes default to a, b, c -- override for 2-AZ regions:
    # az1Suffix: "b"
    # az2Suffix: "c"
    # az3Suffix: "c"
  hypershift:
    awsAccountId: "123456789012"
    oidcBucketName: legion-hypershift-oidc
    oidcBucketRegion: us-east-2
    endpointAccess: Public
  credentials:
    secretStoreName: vault-backend
    awsCredsVaultKey: secret/data/hub/aws
    pullSecretVaultKey: pushsecrets/global-pull-secret
