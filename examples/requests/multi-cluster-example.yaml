# Example: request multiple clusters at once
# This file demonstrates the multi-cluster request pattern.
# Each document (separated by ---) triggers a separate PipelineRun.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-cluster-1
  namespace: cluster-provisioning
  labels:
    legion.io/type: cluster-request
data:
  type: hive
  cluster-name: qe-hive-01
  base-domain: example.com
  cloud-provider: aws
  cloud-region: us-east-2
  cluster-version: img4.17.0-x86-64-appsub
  control-plane-replicas: "3"
  control-plane-machine-type: m5.xlarge
  worker-replicas: "3"
  worker-machine-type: m5.xlarge
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hypershift-cluster-1
  namespace: cluster-provisioning
  labels:
    legion.io/type: cluster-request
data:
  type: hypershift
  cluster-name: qe-hyper-01
  base-domain: example.com
  cloud-region: us-west-2
  node-pool-replicas: "2"
  instance-type: m5.xlarge
