apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xlegionnodepools.legion.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  group: legion.io
  names:
    kind: XLegionNodePool
    plural: xlegionnodepools
  claimNames:
    kind: LegionNodePool
    plural: legionnodepools
  defaultCompositionUpdatePolicy: Automatic
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - clusterName
                - poolName
              properties:
                clusterName:
                  type: string
                  description: "Name of the existing HyperShift HostedCluster to attach this NodePool to"
                poolName:
                  type: string
                  description: "Unique name for this NodePool (used as the NodePool metadata name suffix)"
                cloudRegion:
                  type: string
                  description: "AWS region (must match the HostedCluster region)"
                  default: us-east-2
                replicas:
                  type: integer
                  description: "Number of node replicas"
                  default: 2
                instanceType:
                  type: string
                  description: "EC2 instance type for the nodes"
                  default: m5.xlarge
                releaseImage:
                  type: string
                  description: "OCP release image tag (e.g. 4.17.0). Must be compatible with the HostedCluster version"
                  default: "4.17.0"
                rootVolume:
                  type: object
                  description: "Root EBS volume configuration"
                  properties:
                    size:
                      type: integer
                      description: "Volume size in GB"
                      default: 120
                    type:
                      type: string
                      description: "EBS volume type"
                      default: gp3
                    iops:
                      type: integer
                      description: "Provisioned IOPS (gp3/io1/io2)"
                      default: 3000
                autoScaling:
                  type: object
                  description: "Cluster autoscaler configuration. When set, replicas is used as the initial count"
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    min:
                      type: integer
                      description: "Minimum number of replicas"
                      default: 1
                    max:
                      type: integer
                      description: "Maximum number of replicas"
                      default: 5
                management:
                  type: object
                  description: "Node lifecycle management settings"
                  properties:
                    autoRepair:
                      type: boolean
                      default: true
                    upgradeType:
                      type: string
                      description: "How nodes are upgraded"
                      enum:
                        - Replace
                        - InPlace
                      default: Replace
                    maxUnavailable:
                      type: integer
                      description: "Max nodes unavailable during rolling upgrade"
                      default: 1
                labels:
                  type: object
                  description: "Labels applied to every node in this pool"
                  x-kubernetes-preserve-unknown-fields: true
                taints:
                  type: array
                  description: "Taints applied to every node in this pool"
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      value:
                        type: string
                      effect:
                        type: string
                        enum:
                          - NoSchedule
                          - PreferNoSchedule
                          - NoExecute
                subnetFilter:
                  type: object
                  description: "Subnet selection for node placement"
                  properties:
                    tagKey:
                      type: string
                      description: "AWS tag key to filter subnets"
                      default: "kubernetes.io/role/internal-elb"
                    tagValue:
                      type: string
                      description: "AWS tag value to filter subnets"
                      default: "1"
            status:
              type: object
              properties:
                nodePoolStatus:
                  type: string
                  description: "Current status of the NodePool"
                readyReplicas:
                  type: integer
                  description: "Number of ready replicas"
                message:
                  type: string
                  description: "Human-readable status message"
