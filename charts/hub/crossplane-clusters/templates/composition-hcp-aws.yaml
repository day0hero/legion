                      name: ""
                      namespace: clusters
                    spec:
                      refreshInterval: 1h
                      secretStoreRef:
                        name: vault-backend
                        kind: ClusterSecretStore
                      target:
                        name: ""
                        creationPolicy: Owner
                      data:
                        - secretKey: .dockerconfigjson
                          remoteRef:
                            key: pushsecrets/global-pull-secret
                            property: docker
                providerConfigRef:
                  name: default
            patches:
              - type: CombineFromComposite
                combine:
