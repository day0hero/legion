apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: hcp-aws
  labels:
    legion.io/cluster-type: hcp
    legion.io/cloud-provider: aws
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: legion.io/v1alpha1
    kind: XLegionCluster
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # ──────────────────────────────────────────────────
          # VPC
          # ──────────────────────────────────────────────────
          - name: vpc
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: VPC
              spec:
                forProvider:
                  region: us-east-2
                  cidrBlock: "10.0.0.0/16"
                  enableDnsSupport: true
                  enableDnsHostnames: true
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.vpcCidr
                toFieldPath: spec.forProvider.cidrBlock
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-vpc"
                toFieldPath: spec.forProvider.tags.Name
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.id
                toFieldPath: status.vpcId

          # ──────────────────────────────────────────────────
          # Internet Gateway
          # ──────────────────────────────────────────────────
          - name: internet-gateway
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: InternetGateway
              spec:
                forProvider:
                  region: us-east-2
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-igw"
                toFieldPath: spec.forProvider.tags.Name

          # ──────────────────────────────────────────────────
          # Public Subnets (3 AZs)
          # ──────────────────────────────────────────────────
          - name: public-subnet-1
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Subnet
              metadata:
                labels:
                  legion.io/subnet-type: public
                  legion.io/az-index: "1"
              spec:
                forProvider:
                  region: us-east-2
                  availabilityZone: us-east-2a
                  cidrBlock: "10.0.0.0/20"
                  mapPublicIpOnLaunch: true
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                    "kubernetes.io/role/elb": "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.cloudRegion
                    - fromFieldPath: spec.networking.az1Suffix
                  strategy: string
                  string:
                    fmt: "%s%s"
                toFieldPath: spec.forProvider.availabilityZone
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.publicSubnet1Cidr
                toFieldPath: spec.forProvider.cidrBlock
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-public-1"
                toFieldPath: spec.forProvider.tags.Name

          - name: public-subnet-2
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Subnet
              metadata:
                labels:
                  legion.io/subnet-type: public
                  legion.io/az-index: "2"
              spec:
                forProvider:
                  region: us-east-2
                  availabilityZone: us-east-2b
                  cidrBlock: "10.0.16.0/20"
                  mapPublicIpOnLaunch: true
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                    "kubernetes.io/role/elb": "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.cloudRegion
                    - fromFieldPath: spec.networking.az2Suffix
                  strategy: string
                  string:
                    fmt: "%s%s"
                toFieldPath: spec.forProvider.availabilityZone
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.publicSubnet2Cidr
                toFieldPath: spec.forProvider.cidrBlock
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-public-2"
                toFieldPath: spec.forProvider.tags.Name

          - name: public-subnet-3
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Subnet
              metadata:
                labels:
                  legion.io/subnet-type: public
                  legion.io/az-index: "3"
              spec:
                forProvider:
                  region: us-east-2
                  availabilityZone: us-east-2c
                  cidrBlock: "10.0.32.0/20"
                  mapPublicIpOnLaunch: true
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                    "kubernetes.io/role/elb": "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.cloudRegion
                    - fromFieldPath: spec.networking.az3Suffix
                  strategy: string
                  string:
                    fmt: "%s%s"
                toFieldPath: spec.forProvider.availabilityZone
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.publicSubnet3Cidr
                toFieldPath: spec.forProvider.cidrBlock
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-public-3"
                toFieldPath: spec.forProvider.tags.Name

          # ──────────────────────────────────────────────────
          # Private Subnets (3 AZs)
          # ──────────────────────────────────────────────────
          - name: private-subnet-1
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Subnet
              metadata:
                labels:
                  legion.io/subnet-type: private
                  legion.io/az-index: "1"
              spec:
                forProvider:
                  region: us-east-2
                  availabilityZone: us-east-2a
                  cidrBlock: "10.0.128.0/20"
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                    "kubernetes.io/role/internal-elb": "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.cloudRegion
                    - fromFieldPath: spec.networking.az1Suffix
                  strategy: string
                  string:
                    fmt: "%s%s"
                toFieldPath: spec.forProvider.availabilityZone
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.privateSubnet1Cidr
                toFieldPath: spec.forProvider.cidrBlock
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-private-1"
                toFieldPath: spec.forProvider.tags.Name

          - name: private-subnet-2
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Subnet
              metadata:
                labels:
                  legion.io/subnet-type: private
                  legion.io/az-index: "2"
              spec:
                forProvider:
                  region: us-east-2
                  availabilityZone: us-east-2b
                  cidrBlock: "10.0.144.0/20"
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                    "kubernetes.io/role/internal-elb": "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.cloudRegion
                    - fromFieldPath: spec.networking.az2Suffix
                  strategy: string
                  string:
                    fmt: "%s%s"
                toFieldPath: spec.forProvider.availabilityZone
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.privateSubnet2Cidr
                toFieldPath: spec.forProvider.cidrBlock
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-private-2"
                toFieldPath: spec.forProvider.tags.Name

          - name: private-subnet-3
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Subnet
              metadata:
                labels:
                  legion.io/subnet-type: private
                  legion.io/az-index: "3"
              spec:
                forProvider:
                  region: us-east-2
                  availabilityZone: us-east-2c
                  cidrBlock: "10.0.160.0/20"
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                    "kubernetes.io/role/internal-elb": "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.cloudRegion
                    - fromFieldPath: spec.networking.az3Suffix
                  strategy: string
                  string:
                    fmt: "%s%s"
                toFieldPath: spec.forProvider.availabilityZone
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.privateSubnet3Cidr
                toFieldPath: spec.forProvider.cidrBlock
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-private-3"
                toFieldPath: spec.forProvider.tags.Name

          # ──────────────────────────────────────────────────
          # Elastic IPs for NAT Gateways
          # ──────────────────────────────────────────────────
          - name: eip-nat-1
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: EIP
              metadata:
                labels:
                  legion.io/az-index: "1"
              spec:
                forProvider:
                  region: us-east-2
                  domain: vpc
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-nat-eip-1"
                toFieldPath: spec.forProvider.tags.Name

          - name: eip-nat-2
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: EIP
              metadata:
                labels:
                  legion.io/az-index: "2"
              spec:
                forProvider:
                  region: us-east-2
                  domain: vpc
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-nat-eip-2"
                toFieldPath: spec.forProvider.tags.Name

          - name: eip-nat-3
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: EIP
              metadata:
                labels:
                  legion.io/az-index: "3"
              spec:
                forProvider:
                  region: us-east-2
                  domain: vpc
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-nat-eip-3"
                toFieldPath: spec.forProvider.tags.Name

          # ──────────────────────────────────────────────────
          # NAT Gateways (one per AZ)
          # ──────────────────────────────────────────────────
          - name: nat-gateway-1
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: NATGateway
              metadata:
                labels:
                  legion.io/az-index: "1"
              spec:
                forProvider:
                  region: us-east-2
                  connectivityType: public
                  allocationIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/az-index: "1"
                  subnetIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/subnet-type: public
                      legion.io/az-index: "1"
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-nat-1"
                toFieldPath: spec.forProvider.tags.Name

          - name: nat-gateway-2
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: NATGateway
              metadata:
                labels:
                  legion.io/az-index: "2"
              spec:
                forProvider:
                  region: us-east-2
                  connectivityType: public
                  allocationIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/az-index: "2"
                  subnetIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/subnet-type: public
                      legion.io/az-index: "2"
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-nat-2"
                toFieldPath: spec.forProvider.tags.Name

          - name: nat-gateway-3
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: NATGateway
              metadata:
                labels:
                  legion.io/az-index: "3"
              spec:
                forProvider:
                  region: us-east-2
                  connectivityType: public
                  allocationIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/az-index: "3"
                  subnetIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/subnet-type: public
                      legion.io/az-index: "3"
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-nat-3"
                toFieldPath: spec.forProvider.tags.Name

          # ──────────────────────────────────────────────────
          # Route Tables
          # ──────────────────────────────────────────────────
          - name: public-route-table
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: RouteTable
              metadata:
                labels:
                  legion.io/route-table-type: public
              spec:
                forProvider:
                  region: us-east-2
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-public-rt"
                toFieldPath: spec.forProvider.tags.Name

          - name: private-route-table-1
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: RouteTable
              metadata:
                labels:
                  legion.io/route-table-type: private
                  legion.io/az-index: "1"
              spec:
                forProvider:
                  region: us-east-2
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-private-rt-1"
                toFieldPath: spec.forProvider.tags.Name

          - name: private-route-table-2
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: RouteTable
              metadata:
                labels:
                  legion.io/route-table-type: private
                  legion.io/az-index: "2"
              spec:
                forProvider:
                  region: us-east-2
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-private-rt-2"
                toFieldPath: spec.forProvider.tags.Name

          - name: private-route-table-3
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: RouteTable
              metadata:
                labels:
                  legion.io/route-table-type: private
                  legion.io/az-index: "3"
              spec:
                forProvider:
                  region: us-east-2
                  vpcIdSelector:
                    matchControllerRef: true
                  tags:
                    Name: ""
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-private-rt-3"
                toFieldPath: spec.forProvider.tags.Name

          # ──────────────────────────────────────────────────
          # Routes
          # ──────────────────────────────────────────────────
          - name: public-route
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Route
              spec:
                forProvider:
                  region: us-east-2
                  destinationCidrBlock: "0.0.0.0/0"
                  routeTableIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/route-table-type: public
                  gatewayIdSelector:
                    matchControllerRef: true
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region

          - name: private-route-1
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Route
              spec:
                forProvider:
                  region: us-east-2
                  destinationCidrBlock: "0.0.0.0/0"
                  routeTableIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/route-table-type: private
                      legion.io/az-index: "1"
                  natGatewayIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/az-index: "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region

          - name: private-route-2
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Route
              spec:
                forProvider:
                  region: us-east-2
                  destinationCidrBlock: "0.0.0.0/0"
                  routeTableIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/route-table-type: private
                      legion.io/az-index: "2"
                  natGatewayIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/az-index: "2"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region

          - name: private-route-3
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: Route
              spec:
                forProvider:
                  region: us-east-2
                  destinationCidrBlock: "0.0.0.0/0"
                  routeTableIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/route-table-type: private
                      legion.io/az-index: "3"
                  natGatewayIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/az-index: "3"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region

          # ──────────────────────────────────────────────────
          # Route Table Associations
          # ──────────────────────────────────────────────────
          - name: public-rta-1
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: RouteTableAssociation
              spec:
                forProvider:
                  region: us-east-2
                  routeTableIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/route-table-type: public
                  subnetIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/subnet-type: public
                      legion.io/az-index: "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region

          - name: public-rta-2
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: RouteTableAssociation
              spec:
                forProvider:
                  region: us-east-2
                  routeTableIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/route-table-type: public
                  subnetIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/subnet-type: public
                      legion.io/az-index: "2"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region

          - name: public-rta-3
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: RouteTableAssociation
              spec:
                forProvider:
                  region: us-east-2
                  routeTableIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/route-table-type: public
                  subnetIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/subnet-type: public
                      legion.io/az-index: "3"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region

          - name: private-rta-1
            base:
              apiVersion: ec2.aws.upbound.io/v1beta1
              kind: RouteTableAssociation
              spec:
                forProvider:
                  region: us-east-2
                  routeTableIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/route-table-type: private
                      legion.io/az-index: "1"
                  subnetIdSelector:
                    matchControllerRef: true
                    matchLabels:
                      legion.io/subnet-type: private
                      legion.io/az-index: "1"
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.region

          - name: private-rta-2
            base:
