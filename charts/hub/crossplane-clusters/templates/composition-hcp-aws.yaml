    # ──────────────────────────────────────────────────
    # Elastic IPs for NAT Gateways
    # ──────────────────────────────────────────────────
    - name: eip-nat-1
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: EIP
        metadata:
