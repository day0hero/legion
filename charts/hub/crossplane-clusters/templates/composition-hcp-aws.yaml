                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.spec.infraID
              - type: FromCompositeFieldPath
                fromFieldPath: spec.baseDomain
                toFieldPath: spec.forProvider.manifest.spec.dns.baseDomain
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cloudRegion
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterVersion
                  strategy: string
                  string:
                    fmt: "quay.io/openshift-release-dev/ocp-release:%s-x86_64"
                toFieldPath: spec.forProvider.manifest.spec.release.image
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-pull-secret"
                toFieldPath: spec.forProvider.manifest.spec.pullSecret.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.podCidr
                toFieldPath: spec.forProvider.manifest.spec.networking.clusterNetwork[0].cidr
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.serviceCidr
                toFieldPath: spec.forProvider.manifest.spec.networking.serviceNetwork[0].cidr
              - type: FromCompositeFieldPath
                fromFieldPath: spec.networking.machineCidr
                toFieldPath: spec.forProvider.manifest.spec.networking.machineNetwork[0].cidr
              - type: FromCompositeFieldPath
                fromFieldPath: spec.hypershift.endpointAccess
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.endpointAccess
              - type: FromCompositeFieldPath
                fromFieldPath: status.vpcId
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.cloudProviderConfig.vpc
                policy:
                  fromFieldPath: Required
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.hypershift.oidcBucketName
                    - fromFieldPath: spec.hypershift.oidcBucketRegion
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "https://%s.s3.%s.amazonaws.com/%s"
                toFieldPath: spec.forProvider.manifest.spec.issuerURL
              - type: FromCompositeFieldPath
                fromFieldPath: status.controlPlaneOperatorRoleArn
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.controlPlaneOperatorARN
                policy:
                  fromFieldPath: Required
              - type: FromCompositeFieldPath
                fromFieldPath: status.imageRegistryRoleArn
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.imageRegistryARN
                policy:
                  fromFieldPath: Required
              - type: FromCompositeFieldPath
                fromFieldPath: status.ingressRoleArn
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.ingressARN
                policy:
                  fromFieldPath: Required
              - type: FromCompositeFieldPath
                fromFieldPath: status.kubeCloudControllerRoleArn
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.kubeCloudControllerARN
                policy:
                  fromFieldPath: Required
              - type: FromCompositeFieldPath
                fromFieldPath: status.networkRoleArn
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.networkARN
                policy:
                  fromFieldPath: Required
              - type: FromCompositeFieldPath
                fromFieldPath: status.nodePoolManagementRoleArn
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.nodePoolManagementARN
                policy:
                  fromFieldPath: Required
              - type: FromCompositeFieldPath
                fromFieldPath: status.storageRoleArn
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.storageARN
                policy:
                  fromFieldPath: Required

          # ──────────────────────────────────────────────────
          # NodePool
          # ──────────────────────────────────────────────────
          - name: node-pool
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: hypershift.openshift.io/v1beta1
                    kind: NodePool
                    metadata:
                      name: ""
                      namespace: clusters
                    spec:
                      clusterName: ""
                      replicas: 3
                      management:
                        autoRepair: true
                        upgradeType: Replace
                      platform:
                        type: AWS
                        aws:
                          instanceType: m5.xlarge
                          rootVolume:
                            size: 120
                            type: gp3
                          subnet:
                            filters:
                              - name: "tag:kubernetes.io/role/internal-elb"
                                values:
                                  - "1"
                      release:
                        image: ""
                providerConfigRef:
                  name: default
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterName
                  strategy: string
                  string:
                    fmt: "%s-workers"
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.spec.clusterName
              - type: FromCompositeFieldPath
                fromFieldPath: spec.workerReplicas
                toFieldPath: spec.forProvider.manifest.spec.replicas
              - type: FromCompositeFieldPath
                fromFieldPath: spec.instanceType
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.instanceType
              - type: FromCompositeFieldPath
                fromFieldPath: spec.rootVolumeSize
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rootVolume.size
              - type: FromCompositeFieldPath
                fromFieldPath: spec.rootVolumeType
                toFieldPath: spec.forProvider.manifest.spec.platform.aws.rootVolume.type
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.clusterVersion
                  strategy: string
                  string:
                    fmt: "quay.io/openshift-release-dev/ocp-release:%s-x86_64"
                toFieldPath: spec.forProvider.manifest.spec.release.image
