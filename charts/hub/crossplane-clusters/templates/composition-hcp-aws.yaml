          toFieldPath: spec.forProvider.tags.Name

    # ──────────────────────────────────────────────────
    # Route Tables
    # ──────────────────────────────────────────────────
    - name: public-route-table
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: RouteTable
        metadata:
          labels:
            legion.io/route-table-type: public
        spec:
          forProvider:
            region: us-east-2
            vpcIdSelector:
              matchControllerRef: true
            tags:
              Name: ""
          providerConfigRef:
