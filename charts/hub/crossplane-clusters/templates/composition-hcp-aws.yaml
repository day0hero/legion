                legion.io/az-index: "2"
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region

    - name: private-rta-3
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: RouteTableAssociation
        spec:
          forProvider:
            region: us-east-2
            routeTableIdSelector:
              matchControllerRef: true
              matchLabels:
                legion.io/route-table-type: private
                legion.io/az-index: "3"
            subnetIdSelector:
              matchControllerRef: true
              matchLabels:
                legion.io/subnet-type: private
                legion.io/az-index: "3"
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region

    # ──────────────────────────────────────────────────
    # Security Group for worker nodes
    # ──────────────────────────────────────────────────
    - name: worker-security-group
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: SecurityGroup
        spec:
          forProvider:
            region: us-east-2
            name: ""
            description: "Security group for HCP worker nodes"
            vpcIdSelector:
              matchControllerRef: true
            tags:
              Name: ""
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-worker-sg"
          toFieldPath: spec.forProvider.name
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-worker-sg"
          toFieldPath: spec.forProvider.tags.Name

    - name: worker-sg-egress
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: SecurityGroupRule
        spec:
          forProvider:
            region: us-east-2
            type: egress
            fromPort: 0
            toPort: 0
            protocol: "-1"
            cidrBlocks:
              - "0.0.0.0/0"
            securityGroupIdSelector:
              matchControllerRef: true
            description: "Allow all outbound traffic"
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region

    # ──────────────────────────────────────────────────
    # Cluster namespace
    # ──────────────────────────────────────────────────
    - name: cluster-namespace
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: clusters
          providerConfigRef:
            name: default

    # ──────────────────────────────────────────────────
    # ExternalSecret: pull secret in clusters namespace
    # ──────────────────────────────────────────────────
    - name: pull-secret
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                name: ""
                namespace: clusters
              spec:
                refreshInterval: 1h
                secretStoreRef:
                  name: vault-backend
                  kind: ClusterSecretStore
                target:
                  name: ""
                  creationPolicy: Owner
                data:
                  - secretKey: .dockerconfigjson
                    remoteRef:
                      key: pushsecrets/global-pull-secret
                      property: content
          providerConfigRef:
            name: default
      patches:
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-pull-secret"
          toFieldPath: spec.forProvider.manifest.metadata.name
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-pull-secret"
          toFieldPath: spec.forProvider.manifest.spec.target.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.credentials.secretStoreName
          toFieldPath: spec.forProvider.manifest.spec.secretStoreRef.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.credentials.pullSecretVaultKey
          toFieldPath: spec.forProvider.manifest.spec.data[0].remoteRef.key

    # ──────────────────────────────────────────────────
    # ExternalSecret: AWS credentials in clusters namespace
    # ──────────────────────────────────────────────────
    - name: aws-creds-secret
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                name: ""
                namespace: clusters
              spec:
                refreshInterval: 1h
                secretStoreRef:
                  name: vault-backend
                  kind: ClusterSecretStore
                target:
                  name: ""
                  creationPolicy: Owner
                data:
                  - secretKey: aws_access_key_id
                    remoteRef:
                      key: secret/data/hub/aws
                      property: aws_access_key_id
                  - secretKey: aws_secret_access_key
                    remoteRef:
                      key: secret/data/hub/aws
                      property: aws_secret_access_key
          providerConfigRef:
            name: default
      patches:
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-aws-creds"
          toFieldPath: spec.forProvider.manifest.metadata.name
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-aws-creds"
          toFieldPath: spec.forProvider.manifest.spec.target.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.credentials.secretStoreName
          toFieldPath: spec.forProvider.manifest.spec.secretStoreRef.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.credentials.awsCredsVaultKey
          toFieldPath: spec.forProvider.manifest.spec.data[0].remoteRef.key
        - type: FromCompositeFieldPath
          fromFieldPath: spec.credentials.awsCredsVaultKey
          toFieldPath: spec.forProvider.manifest.spec.data[1].remoteRef.key

    # ──────────────────────────────────────────────────
    # HostedCluster
    # ──────────────────────────────────────────────────
    - name: hosted-cluster
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: hypershift.openshift.io/v1beta1
              kind: HostedCluster
              metadata:
                name: ""
                namespace: clusters
                labels:
                  vendor: OpenShift
                  cluster.open-cluster-management.io/clusterset: default
              spec:
                release:
                  image: ""
                pullSecret:
                  name: ""
                sshKey:
                  name: ""
                networking:
                  clusterNetwork:
                    - cidr: "10.128.0.0/14"
                  serviceNetwork:
                    - cidr: "172.30.0.0/16"
                  networkType: OVNKubernetes
                  machineNetwork:
                    - cidr: "10.0.0.0/16"
                platform:
                  type: AWS
                  aws:
                    region: us-east-2
                    endpointAccess: Public
                    cloudProviderConfig:
                      vpc:
                        id: ""
                      subnet:
                        filters:
                          - name: "tag:kubernetes.io/role/internal-elb"
                            values:
                              - "1"
                    rolesRef:
                      controlPlaneOperatorARN: ""
                      imageRegistryARN: ""
                      ingressARN: ""
                      kubeCloudControllerARN: ""
                      networkARN: ""
                      nodePoolManagementARN: ""
                      storageARN: ""
                infraID: ""
                dns:
                  baseDomain: ""
                fips: false
                issuerURL: ""
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.clusterName
          toFieldPath: spec.forProvider.manifest.metadata.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.clusterName
          toFieldPath: spec.forProvider.manifest.spec.infraID
        - type: FromCompositeFieldPath
          fromFieldPath: spec.baseDomain
          toFieldPath: spec.forProvider.manifest.spec.dns.baseDomain
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.region
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterVersion
            strategy: string
            string:
              fmt: "quay.io/openshift-release-dev/ocp-release:%s-x86_64"
          toFieldPath: spec.forProvider.manifest.spec.release.image
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-pull-secret"
          toFieldPath: spec.forProvider.manifest.spec.pullSecret.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networking.podCidr
          toFieldPath: spec.forProvider.manifest.spec.networking.clusterNetwork[0].cidr
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networking.serviceCidr
          toFieldPath: spec.forProvider.manifest.spec.networking.serviceNetwork[0].cidr
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networking.machineCidr
          toFieldPath: spec.forProvider.manifest.spec.networking.machineNetwork[0].cidr
        - type: FromCompositeFieldPath
          fromFieldPath: spec.hypershift.endpointAccess
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.endpointAccess
        - type: FromCompositeFieldPath
          fromFieldPath: status.vpcId
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.cloudProviderConfig.vpc.id
          policy:
            fromFieldPath: Required
        - type: FromCompositeFieldPath
          fromFieldPath: spec.hypershift.roleArn
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.controlPlaneOperatorARN
        - type: FromCompositeFieldPath
          fromFieldPath: spec.hypershift.roleArn
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.imageRegistryARN
        - type: FromCompositeFieldPath
          fromFieldPath: spec.hypershift.roleArn
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.ingressARN
        - type: FromCompositeFieldPath
          fromFieldPath: spec.hypershift.roleArn
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.kubeCloudControllerARN
        - type: FromCompositeFieldPath
          fromFieldPath: spec.hypershift.roleArn
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.networkARN
        - type: FromCompositeFieldPath
          fromFieldPath: spec.hypershift.roleArn
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.nodePoolManagementARN
        - type: FromCompositeFieldPath
          fromFieldPath: spec.hypershift.roleArn
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rolesRef.storageARN

    # ──────────────────────────────────────────────────
    # NodePool
    # ──────────────────────────────────────────────────
    - name: node-pool
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: hypershift.openshift.io/v1beta1
              kind: NodePool
              metadata:
                name: ""
                namespace: clusters
              spec:
                clusterName: ""
                replicas: 3
                management:
                  autoRepair: true
                  upgradeType: Replace
                platform:
                  type: AWS
                  aws:
                    instanceType: m5.xlarge
                    rootVolume:
                      size: 120
                      type: gp3
                    subnetID: ""
                release:
                  image: ""
          providerConfigRef:
            name: default
      patches:
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-workers"
          toFieldPath: spec.forProvider.manifest.metadata.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.clusterName
          toFieldPath: spec.forProvider.manifest.spec.clusterName
        - type: FromCompositeFieldPath
          fromFieldPath: spec.workerReplicas
          toFieldPath: spec.forProvider.manifest.spec.replicas
        - type: FromCompositeFieldPath
          fromFieldPath: spec.instanceType
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.instanceType
        - type: FromCompositeFieldPath
          fromFieldPath: spec.rootVolumeSize
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rootVolume.size
        - type: FromCompositeFieldPath
          fromFieldPath: spec.rootVolumeType
          toFieldPath: spec.forProvider.manifest.spec.platform.aws.rootVolume.type
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterVersion
            strategy: string
            string:
              fmt: "quay.io/openshift-release-dev/ocp-release:%s-x86_64"
          toFieldPath: spec.forProvider.manifest.spec.release.image
