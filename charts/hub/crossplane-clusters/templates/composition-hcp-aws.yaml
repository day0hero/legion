              spec:
                forProvider:
                  manifest:
                    apiVersion: hypershift.openshift.io/v1beta1
                    kind: HostedCluster
                    metadata:
                      name: ""
                      namespace: clusters
                      labels:
                        vendor: OpenShift
                        cluster.open-cluster-management.io/clusterset: default
                    spec:
                      release:
                        image: ""
                      pullSecret:
                        name: ""
                      networking:
                        clusterNetwork:
                          - cidr: "10.128.0.0/14"
                        serviceNetwork:
                          - cidr: "172.30.0.0/16"
