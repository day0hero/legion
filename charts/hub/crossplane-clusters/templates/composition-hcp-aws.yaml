apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: hcp-aws
  labels:
    legion.io/cluster-type: hcp
    legion.io/cloud-provider: aws
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: legion.io/v1alpha1
    kind: XLegionCluster
  resources:
    # ──────────────────────────────────────────────────
    # VPC
    # ──────────────────────────────────────────────────
    - name: vpc
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: VPC
        spec:
          forProvider:
            region: us-east-2
            cidrBlock: "10.0.0.0/16"
            enableDnsSupport: true
            enableDnsHostnames: true
            tags:
              Name: ""
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networking.vpcCidr
          toFieldPath: spec.forProvider.cidrBlock
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-vpc"
          toFieldPath: spec.forProvider.tags.Name
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.id
          toFieldPath: status.vpcId

    # ──────────────────────────────────────────────────
    # Internet Gateway
    # ──────────────────────────────────────────────────
    - name: internet-gateway
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: InternetGateway
        spec:
          forProvider:
            region: us-east-2
            vpcIdSelector:
              matchControllerRef: true
            tags:
              Name: ""
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-igw"
          toFieldPath: spec.forProvider.tags.Name

    # ──────────────────────────────────────────────────
    # Public Subnets (3 AZs)
    # ──────────────────────────────────────────────────
    - name: public-subnet-1
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: Subnet
        metadata:
          labels:
            legion.io/subnet-type: public
            legion.io/az-index: "1"
        spec:
          forProvider:
            region: us-east-2
            availabilityZone: us-east-2a
            cidrBlock: "10.0.0.0/20"
            mapPublicIpOnLaunch: true
            vpcIdSelector:
              matchControllerRef: true
            tags:
              Name: ""
              "kubernetes.io/role/elb": "1"
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.cloudRegion
            strategy: string
            string:
              fmt: "%sa"
          toFieldPath: spec.forProvider.availabilityZone
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networking.publicSubnet1Cidr
          toFieldPath: spec.forProvider.cidrBlock
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-public-1"
          toFieldPath: spec.forProvider.tags.Name
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.id
          toFieldPath: status.publicSubnetIds
          transforms:
            - type: string
              string:
                type: Convert
                convert: ToUpper
          policy:
            fromFieldPath: Optional

    - name: public-subnet-2
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: Subnet
        metadata:
          labels:
            legion.io/subnet-type: public
            legion.io/az-index: "2"
        spec:
          forProvider:
            region: us-east-2
            availabilityZone: us-east-2b
            cidrBlock: "10.0.16.0/20"
            mapPublicIpOnLaunch: true
            vpcIdSelector:
              matchControllerRef: true
            tags:
              Name: ""
              "kubernetes.io/role/elb": "1"
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.cloudRegion
            strategy: string
            string:
              fmt: "%sb"
          toFieldPath: spec.forProvider.availabilityZone
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networking.publicSubnet2Cidr
          toFieldPath: spec.forProvider.cidrBlock
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-public-2"
          toFieldPath: spec.forProvider.tags.Name

    - name: public-subnet-3
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: Subnet
        metadata:
          labels:
            legion.io/subnet-type: public
            legion.io/az-index: "3"
        spec:
          forProvider:
            region: us-east-2
            availabilityZone: us-east-2c
            cidrBlock: "10.0.32.0/20"
            mapPublicIpOnLaunch: true
            vpcIdSelector:
              matchControllerRef: true
            tags:
              Name: ""
              "kubernetes.io/role/elb": "1"
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.cloudRegion
            strategy: string
            string:
              fmt: "%sc"
          toFieldPath: spec.forProvider.availabilityZone
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networking.publicSubnet3Cidr
          toFieldPath: spec.forProvider.cidrBlock
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-public-3"
          toFieldPath: spec.forProvider.tags.Name

    # ──────────────────────────────────────────────────
    # Private Subnets (3 AZs)
    # ──────────────────────────────────────────────────
    - name: private-subnet-1
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: Subnet
        metadata:
          labels:
            legion.io/subnet-type: private
            legion.io/az-index: "1"
        spec:
          forProvider:
            region: us-east-2
            availabilityZone: us-east-2a
            cidrBlock: "10.0.128.0/20"
            vpcIdSelector:
              matchControllerRef: true
            tags:
              Name: ""
              "kubernetes.io/role/internal-elb": "1"
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.cloudRegion
            strategy: string
            string:
              fmt: "%sa"
          toFieldPath: spec.forProvider.availabilityZone
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networking.privateSubnet1Cidr
          toFieldPath: spec.forProvider.cidrBlock
        - type: CombineFromComposite
          combine:
            variables:
              - fromFieldPath: spec.clusterName
            strategy: string
            string:
              fmt: "%s-private-1"
          toFieldPath: spec.forProvider.tags.Name

    - name: private-subnet-2
      base:
        apiVersion: ec2.aws.upbound.io/v1beta1
        kind: Subnet
        metadata:
          labels:
            legion.io/subnet-type: private
            legion.io/az-index: "2"
        spec:
          forProvider:
            region: us-east-2
            availabilityZone: us-east-2b
            cidrBlock: "10.0.144.0/20"
            vpcIdSelector:
              matchControllerRef: true
            tags:
              Name: ""
              "kubernetes.io/role/internal-elb": "1"
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.cloudRegion
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
