apiVersion: v1
kind: ServiceAccount
metadata:
  name: perses
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: perses
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: legion-monitoring-perses-cluster-monitoring-view
  labels:
    app.kubernetes.io/name: perses
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: perses
    namespace: {{ .Values.namespace }}
