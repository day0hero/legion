apiVersion: apps/v1
kind: Deployment
metadata:
  name: perses
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: perses
    app.kubernetes.io/component: monitoring
spec:
  replicas: {{ .Values.perses.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: perses
  template:
    metadata:
      labels:
        app.kubernetes.io/name: perses
    spec:
      serviceAccountName: perses
      containers:
        - name: perses
          image: {{ .Values.perses.image }}
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.perses.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/perses/config
            - name: dashboards
              mountPath: /etc/perses/provisioning/dashboards
            - name: datasources
              mountPath: /etc/perses/provisioning/datasources
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
      volumes:
        - name: config
          configMap:
            name: perses-config
        - name: dashboards
          configMap:
            name: perses-dashboards
        - name: datasources
          configMap:
            name: perses-datasources
