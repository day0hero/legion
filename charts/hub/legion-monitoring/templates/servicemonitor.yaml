apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: perses
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: perses
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: perses
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: 30s
      scheme: http
      relabelings:
        - targetLabel: job
          replacement: perses
