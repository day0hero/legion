{{- if and .Values.global.hypershift.oidc.region .Values.global.hypershift.oidc.bucketName }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hypershift-eso-oidc
  namespace: local-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: hypershift-operator-oidc-provider-s3-credentials
    template:
      mergePolicy: Merge
      type: Opaque
      data:
        region: {{ .Values.global.hypershift.oidc.region }}
        bucket: {{ .Values.global.hypershift.oidc.bucketName }}
  dataFrom:
  - extract:
      key: {{ .Values.awsCreds.key }}
{{- end }}
