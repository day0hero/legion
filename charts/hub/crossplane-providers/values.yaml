crossplane:
  providers:
    version: v2.4.0
    packages:
      - name: provider-family-aws
        package: xpkg.upbound.io/upbound/provider-family-aws
      - name: provider-aws-ec2
        package: xpkg.upbound.io/upbound/provider-aws-ec2

  kubernetesProvider:
    version: v0.16.0
    package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes

  providerConfig:
    name: default
    credentials:
      secretName: aws-provider-creds
      secretNamespace: crossplane-system
      secretKey: credentials
      fromVault: true
